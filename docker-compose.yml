version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: simmons-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: simmons
      POSTGRES_PASSWORD: simmons123
      POSTGRES_DB: simmons_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simmons"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: simmons-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://simmons:simmons123@postgres:5432/simmons_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: simmons-frontend
    restart: unless-stopped
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
